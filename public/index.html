<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #chat-container {
      width: 400px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    #header {
      background: #075e54;
      color: white;
      padding: 15px 20px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #logout-btn {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
    }
    #messages {
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }
    .mine {
      background: #dcf8c6;
      align-self: flex-end;
    }
    .others {
      background: #f0f0f0;
      align-self: flex-start;
    }
    .msg-username {
      font-size: 11px;
      font-weight: bold;
      color: #075e54;
      margin-bottom: 3px;
    }
    #input-area {
      display: flex;
      border-top: 1px solid #eee;
      padding: 10px;
      gap: 10px;
    }
    #input-area input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      outline: none;
      font-size: 14px;
    }
    #input-area button {
      background: #075e54;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }
    #input-area button:hover { background: #128c7e; }
  </style>
</head>
<body>

  <div id="chat-container">
    <div id="header">
      <span>💬 Chat App</span>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off"/>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Check if user is logged in
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');

    if (!token) {
      window.location.href = '/login.html';
    }

    const socket = io();

    const input = document.getElementById('msg-input');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('send-btn');

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const msg = input.value.trim();
      if (msg) {
        socket.emit('chat message', { text: msg, username: username });
        input.value = '';
      }
    }

    socket.on('chat message', (data) => {
      const div = document.createElement('div');
      div.classList.add('message');
      div.classList.add(data.username === username ? 'mine' : 'others');

      const name = document.createElement('div');
      name.classList.add('msg-username');
      name.textContent = data.username;

      const text = document.createElement('div');
      text.textContent = data.text;

      div.appendChild(name);
      div.appendChild(text);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    });

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/login.html';
    }
  </script>

</body>
</html>
