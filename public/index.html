<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chat App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #212121;
      --surface: #2f2f2f;
      --surface2: #3a3a3a;
      --border: rgba(255,255,255,0.1);
      --text: #ececec;
      --text-muted: #8e8ea0;
      --input-bg: #2f2f2f;
      --send: #e8a838;
    }

    html { height: 100%; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      color: var(--text);
      height: 100svh;
      overflow: hidden;
    }

    #header {
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    #header-left { display: flex; align-items: center; gap: 10px; }
    #avatar {
      width: 32px; height: 32px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      border: 1px solid var(--border);
    }
    #header-info h3 { font-size: 15px; font-weight: 500; color: var(--text); }
    #header-info p { font-size: 12px; color: var(--text-muted); }
    #logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .msg-row {
      display: flex;
      padding: 4px 16px;
      gap: 10px;
      width: 100%;
    }
    .msg-row.mine { justify-content: flex-end; }
    .msg-row.others { justify-content: flex-start; }

    .msg-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .msg-content { display: flex; flex-direction: column; gap: 3px; max-width: 75%; }

    .msg-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      padding-left: 2px;
    }

    .bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      word-break: break-word;
    }
    .mine .bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }
    .others .bubble {
      background: transparent;
      color: var(--text);
      padding-left: 2px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 2px;
    }
    .mine .msg-time { text-align: right; }

    #input-wrap {
      flex-shrink: 0;
      background: var(--bg);
      padding: 10px 12px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    #input-box {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 8px 8px 14px;
    }
    #input-box:focus-within { border-color: rgba(255,255,255,0.25); }
    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--text);
      resize: none;
      line-height: 1.5;
      max-height: 100px;
      font-family: inherit;
    }
    #msg-input::placeholder { color: var(--text-muted); }
    #send-btn {
      background: var(--send);
      color: #1a1a1a;
      border: none;
      width: 32px; height: 32px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    #ai-fab {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom));
      right: 14px;
      width: 38px; height: 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 100;
      font-size: 17px;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    #ai-fab:hover { opacity: 1; }

    #ai-panel {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 200;
      display: none;
      flex-direction: column;
      height: 100svh;
    }
    #ai-panel.open {
      display: flex;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #ai-header {
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #ai-back {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 5px 10px;
      font-family: inherit;
    }
    #ai-avatar-icon {
      width: 30px; height: 30px;
      background: #c96442;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    #ai-info h3 { font-size: 15px; font-weight: 500; }
    #ai-info p { font-size: 12px; color: #4caf6e; }

    #ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .ai-row {
      display: flex;
      padding: 4px 16px;
      gap: 10px;
      width: 100%;
    }
    .ai-row.user-row { justify-content: flex-end; }
    .ai-row.bot-row { justify-content: flex-start; }

    .ai-row-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #c96442;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .ai-bubble {
      max-width: 80%;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      word-break: break-word;
      white-space: pre-wrap;
      color: var(--text);
    }
    .user-row .ai-bubble {
      background: var(--surface);
      padding: 9px 13px;
      border-radius: 16px;
      border-bottom-right-radius: 4px;
    }
    .bot-row .ai-bubble {
      background: transparent;
      padding: 2px 0;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 0;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    #ai-input-wrap {
      flex-shrink: 0;
      background: var(--bg);
      padding: 10px 12px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    #ai-input-box {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 8px 8px 14px;
    }
    #ai-input-box:focus-within { border-color: rgba(255,255,255,0.25); }
    #ai-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--text);
      resize: none;
      line-height: 1.5;
      font-family: inherit;
      max-height: 100px;
    }
    #ai-input::placeholder { color: var(--text-muted); }
    #ai-send-btn {
      background: var(--send);
      color: #1a1a1a;
      border: none;
      width: 32px; height: 32px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 8px;
      color: var(--text-muted);
      font-size: 14px;
    }
    #empty-state span { font-size: 28px; }
  </style>
</head>
<body>

  <div id="header">
    <div id="header-left">
      <div id="avatar">👥</div>
      <div id="header-info">
        <h3>Group Chat</h3>
        <p id="status">connecting...</p>
      </div>
    </div>
    <button id="logout-btn" onclick="logout()">Log out</button>
  </div>

  <div id="messages">
    <div id="empty-state">
      <span>💬</span>
      <p>No messages yet. Say something!</p>
    </div>
  </div>

  <div id="input-wrap">
    <div id="input-box">
      <textarea id="msg-input" placeholder="Message the group..." rows="1" autocomplete="off"></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>

  <div id="ai-fab" onclick="openAI()" title="AI Assistant">✦</div>

  <div id="ai-panel">
    <div id="ai-header">
      <button id="ai-back" onclick="closeAI()">← Back</button>
      <div id="ai-avatar-icon">✦</div>
      <div id="ai-info">
        <h3>AI Assistant</h3>
        <p>● Online</p>
      </div>
    </div>
    <div id="ai-messages"></div>
    <div id="ai-input-wrap">
      <div id="ai-input-box">
        <textarea id="ai-input" placeholder="Ask me anything..." rows="1" autocomplete="off"></textarea>
        <button id="ai-send-btn">➤</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');
    if (!token) window.location.href = '/login.html';

    let GROQ_API_KEY = '';
    async function loadConfig() {
      const res = await fetch('/config');
      const data = await res.json();
      GROQ_API_KEY = data.groqKey;
    }
    loadConfig();

    const socket = io();
    const input = document.getElementById('msg-input');
    const messagesEl = document.getElementById('messages');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    socket.on('connect', () => { status.textContent = 'online'; });
    socket.on('disconnect', () => { status.textContent = 'offline'; });

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    });

    function sendMessage() {
      const msg = input.value.trim();
      if (msg) {
        socket.emit('chat message', { text: msg, username });
        input.value = '';
        input.style.height = 'auto';
      }
    }

    function getTime() {
      const now = new Date();
      return now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
    }

    socket.on('chat message', (data) => {
      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();

      const isMine = data.username === username;
      const row = document.createElement('div');
      row.classList.add('msg-row', isMine ? 'mine' : 'others');

      if (!isMine) {
        const av = document.createElement('div');
        av.classList.add('msg-avatar');
        av.textContent = data.username[0].toUpperCase();
        row.appendChild(av);
      }

      const content = document.createElement('div');
      content.classList.add('msg-content');

      if (!isMine) {
        const name = document.createElement('div');
        name.classList.add('msg-name');
        name.textContent = data.username;
        content.appendChild(name);
      }

      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.textContent = data.text;
      content.appendChild(bubble);

      const time = document.createElement('div');
      time.classList.add('msg-time');
      time.textContent = getTime();
      content.appendChild(time);

      row.appendChild(content);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/login.html';
    }

    const aiPanel = document.getElementById('ai-panel');
    const aiMessages = document.getElementById('ai-messages');
    const aiInput = document.getElementById('ai-input');
    const aiSendBtn = document.getElementById('ai-send-btn');
    const aiHistory = [];

    function openAI() {
      aiPanel.classList.add('open');
      if (aiMessages.children.length === 0) {
        addAIMessage("Hey! I'm your AI assistant powered by Groq. Ask me anything!", 'bot');
      }
    }

    function closeAI() { aiPanel.classList.remove('open'); }

    aiSendBtn.addEventListener('click', sendAIMessage);
    aiInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAIMessage(); }
    });
    aiInput.addEventListener('input', () => {
      aiInput.style.height = 'auto';
      aiInput.style.height = Math.min(aiInput.scrollHeight, 100) + 'px';
    });

    async function sendAIMessage() {
      const msg = aiInput.value.trim();
      if (!msg) return;
      aiInput.value = '';
      aiInput.style.height = 'auto';

      addAIMessage(msg, 'user');
      aiHistory.push({ role: 'user', content: msg });

      const typingRow = document.createElement('div');
      typingRow.classList.add('ai-row', 'bot-row');
      const typingAv = document.createElement('div');
      typingAv.classList.add('ai-row-avatar');
      typingAv.textContent = '✦';
      const typingBubble = document.createElement('div');
      typingBubble.classList.add('ai-bubble');
      typingBubble.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      typingRow.appendChild(typingAv);
      typingRow.appendChild(typingBubble);
      aiMessages.appendChild(typingRow);
      aiMessages.scrollTop = aiMessages.scrollHeight;

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: [
              { role: 'system', content: 'You are a helpful assistant. Keep answers clear, concise and friendly.' },
              ...aiHistory
            ]
          })
        });
        const data = await res.json();
        typingRow.remove();
        const reply = data.choices[0].message.content;
        aiHistory.push({ role: 'assistant', content: reply });
        addAIMessage(reply, 'bot');
      } catch (err) {
        typingRow.remove();
        addAIMessage('Sorry, something went wrong! Try again.', 'bot');
      }
    }

    function addAIMessage(text, type) {
      const row = document.createElement('div');
      row.classList.add('ai-row', type === 'user' ? 'user-row' : 'bot-row');

      if (type === 'bot') {
        const av = document.createElement('div');
        av.classList.add('ai-row-avatar');
        av.textContent = '✦';
        row.appendChild(av);
      }

      const bubble = document.createElement('div');
      bubble.classList.add('ai-bubble');
      bubble.textContent = text;
      row.appendChild(bubble);

      aiMessages.appendChild(row);
      aiMessages.scrollTop = aiMessages.scrollHeight;
    }
  </script>
</body>
</html>
