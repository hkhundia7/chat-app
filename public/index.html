<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#212121">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chat">
  <style>
    html { height: -webkit-fill-available; }
  </style>
  <title>Chat App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #212121;
      --surface: #2f2f2f;
      --surface2: #3a3a3a;
      --border: rgba(255,255,255,0.1);
      --text: #ececec;
      --text-muted: #8e8ea0;
      --input-bg: #2f2f2f;
      --send: #e8a838;
    }
    html, body { height: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      color: var(--text);
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    #tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: var(--send);
      border-bottom-color: var(--send);
    }
    #header {
      padding: 10px 16px;
      padding-top: max(10px, env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    #header-left { display: flex; align-items: center; gap: 10px; }
    #avatar {
      width: 32px; height: 32px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    #header-info h3 { font-size: 15px; font-weight: 500; }
    #header-info p { font-size: 12px; color: var(--text-muted); }
    #logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }
    .msg-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .msg-row {
      display: flex;
      padding: 3px 16px;
      gap: 8px;
    }
    .msg-row.mine { justify-content: flex-end; }
    .msg-row.others { justify-content: flex-start; }
    .msg-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 4px;
      color: var(--text-muted);
    }
    .msg-content { display: flex; flex-direction: column; gap: 2px; max-width: 75%; }
    .msg-name { font-size: 11px; color: var(--text-muted); padding-left: 2px; }
    .bubble-wrap { position: relative; }
    .bubble {
      padding: 8px 12px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      word-break: break-word;
      cursor: pointer;
    }
    .mine .bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }
    .others .bubble {
      background: transparent;
      color: var(--text);
      padding-left: 2px;
    }
    .msg-time { font-size: 10px; color: var(--text-muted); padding: 0 2px; }
    .mine .msg-time { text-align: right; }
    .reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 3px;
    }
    .reaction-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .emoji-picker {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      display: flex;
      gap: 6px;
      z-index: 50;
      bottom: 100%;
      left: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .emoji-picker span {
      font-size: 20px;
      cursor: pointer;
      padding: 2px;
      border-radius: 6px;
    }
    .emoji-picker span:hover { background: var(--surface2); }
    .input-wrap {
      flex-shrink: 0;
      background: var(--bg);
      padding: 8px 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
    }
    .input-box {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 8px 8px 14px;
    }
    .input-box:focus-within { border-color: rgba(255,255,255,0.25); }
    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--text);
      resize: none;
      line-height: 1.5;
      max-height: 80px;
      font-family: inherit;
    }
    .chat-input::placeholder { color: var(--text-muted); }
    .send-btn {
      background: var(--send);
      color: #1a1a1a;
      border: none;
      width: 32px; height: 32px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #users-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .user-item:hover { background: var(--surface2); }
    .user-dot {
      width: 8px; height: 8px;
      background: #4caf6e;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .user-av {
      width: 36px; height: 36px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-name { font-size: 15px; font-weight: 500; }
    .user-sub { font-size: 12px; color: var(--text-muted); }
    .dm-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--send);
      background: rgba(232,168,56,0.15);
      padding: 3px 8px;
      border-radius: 8px;
    }
    #dm-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #dm-back {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    #dm-name { font-size: 15px; font-weight: 500; }
    #ai-fab {
      position: fixed;
      bottom: calc(70px + env(safe-area-inset-bottom));
      right: 14px;
      width: 36px; height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 100;
      font-size: 16px;
      opacity: 0.35;
      transition: opacity 0.2s;
    }
    #ai-fab:hover { opacity: 1; }
    #ai-panel {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 200;
      display: none;
      flex-direction: column;
      height: 100dvh;
    }
    #ai-panel.open { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #ai-header {
      padding: 10px 16px;
      padding-top: max(10px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #ai-avatar-icon {
      width: 28px; height: 28px;
      background: #c96442;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }
    #ai-info h3 { font-size: 14px; font-weight: 500; }
    #ai-info p { font-size: 11px; color: #4caf6e; }
    #ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      -webkit-overflow-scrolling: touch;
    }
    .ai-row {
      display: flex;
      padding: 3px 16px;
      gap: 8px;
    }
    .ai-row.user-row { justify-content: flex-end; }
    .ai-row-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #c96442;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .ai-bubble {
      max-width: 80%;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
      color: var(--text);
    }
    .user-row .ai-bubble {
      background: var(--surface);
      padding: 8px 12px;
      border-radius: 16px;
      border-bottom-right-radius: 4px;
    }
    .bot-row .ai-bubble { background: transparent; padding: 2px 0; }
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 8px 0; }
    .dot {
      width: 5px; height: 5px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
    #ai-input-wrap {
      flex-shrink: 0;
      background: var(--bg);
      padding: 8px 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
    }
    #ai-input-box {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 8px 8px 14px;
    }
    #ai-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: var(--text);
      resize: none;
      line-height: 1.5;
      font-family: inherit;
      max-height: 80px;
    }
    #ai-input::placeholder { color: var(--text-muted); }
    #ai-send-btn {
      background: var(--send);
      color: #1a1a1a;
      border: none;
      width: 32px; height: 32px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="header">
    <div id="header-left">
      <div id="avatar">👥</div>
      <div id="header-info">
        <h3 id="header-title">Group Chat</h3>
        <p id="status">connecting...</p>
      </div>
    </div>
    <button id="logout-btn" onclick="logout()">Log out</button>
  </div>

  <div id="tabs">
    <div class="tab active" onclick="showTab('group')">💬 Group</div>
    <div class="tab" onclick="showTab('people')">👥 People</div>
  </div>

  <div id="screen-group" class="screen active">
    <div class="msg-list" id="group-messages"></div>
    <div class="input-wrap">
      <div class="input-box">
        <textarea class="chat-input" id="msg-input" placeholder="Message the group..." rows="1" autocomplete="off"></textarea>
        <button class="send-btn" id="send-btn">➤</button>
      </div>
    </div>
  </div>

  <div id="screen-people" class="screen">
    <div id="users-list"></div>
  </div>

  <div id="screen-dm" class="screen">
    <div id="dm-header">
      <button id="dm-back" onclick="showTab('people')">← Back</button>
      <div class="user-av" id="dm-av"></div>
      <div>
        <div id="dm-name"></div>
        <div style="font-size:11px;color:#4caf6e">● Online</div>
      </div>
    </div>
    <div class="msg-list" id="dm-messages"></div>
    <div class="input-wrap">
      <div class="input-box">
        <textarea class="chat-input" id="dm-input" placeholder="Private message..." rows="1" autocomplete="off"></textarea>
        <button class="send-btn" id="dm-send-btn">➤</button>
      </div>
    </div>
  </div>

  <div id="ai-fab" onclick="openAI()">✦</div>

  <div id="ai-panel">
    <div id="ai-header">
      <div id="ai-avatar-icon">✦</div>
      <div id="ai-info" onclick="closeAI()" style="cursor:pointer;">
        <h3>claude.ai</h3>
        <p></p>
      </div>
    </div>
    <div id="ai-messages"></div>
    <div id="ai-input-wrap">
      <div id="ai-input-box">
        <textarea id="ai-input" placeholder="Ask me anything..." rows="1" autocomplete="off"></textarea>
        <button id="ai-send-btn">➤</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');
    if (!token) window.location.href = '/login.html';

    let GROQ_API_KEY = '';
    fetch('/config').then(r => r.json()).then(d => { GROQ_API_KEY = d.groqKey; });

    const socket = io({ auth: { token } });
    const EMOJIS = ['👍','❤️','😂','😮','😢','🔥'];
    let currentDM = null;
    let activeEmojiPicker = null;

    document.querySelectorAll('.chat-input, #ai-input').forEach(el => {
      el.addEventListener('input', () => {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 80) + 'px';
      });
    });

    function showTab(tab) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (tab === 'group') {
        document.getElementById('screen-group').classList.add('active');
        document.querySelector('.tab:nth-child(1)').classList.add('active');
      } else if (tab === 'people') {
        document.getElementById('screen-people').classList.add('active');
        document.querySelector('.tab:nth-child(2)').classList.add('active');
      } else if (tab === 'dm') {
        document.getElementById('screen-dm').classList.add('active');
      }
    }

    socket.on('connect', () => { document.getElementById('status').textContent = 'online'; });
    socket.on('disconnect', () => { document.getElementById('status').textContent = 'offline'; });

    socket.on('online users', (users) => {
      const list = document.getElementById('users-list');
      list.innerHTML = '';
      users.forEach(u => {
        if (u === username) return;
        const item = document.createElement('div');
        item.classList.add('user-item');
        item.innerHTML = `
          <div class="user-dot"></div>
          <div class="user-av">${u[0].toUpperCase()}</div>
          <div>
            <div class="user-name">${u}</div>
            <div class="user-sub">Tap to message</div>
          </div>
          <div class="dm-badge">DM</div>
        `;
        item.onclick = () => openDM(u);
        list.appendChild(item);
      });
      if (list.children.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px 16px;font-size:14px;">No one else is online yet 👀</div>';
      }
    });

    const groupMessages = document.getElementById('group-messages');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');

    sendBtn.onclick = sendGroupMessage;
    msgInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendGroupMessage(); }
    });

    function sendGroupMessage() {
      const msg = msgInput.value.trim();
      if (msg) {
        socket.emit('chat message', { text: msg, username });
        msgInput.value = '';
        msgInput.style.height = 'auto';
        msgInput.focus();
      }
    }

    socket.on('chat message', (data) => {
      appendMessage(groupMessages, data, false);
    });

    socket.on('reaction', ({ messageId, emoji, username: reacter }) => {
      const bubble = document.querySelector(`[data-id="${messageId}"]`);
      if (!bubble) return;
      const reactionsEl = bubble.closest('.msg-content').querySelector('.reactions');
      const existing = reactionsEl.querySelector(`[data-emoji="${emoji}"]`);
      if (existing) {
        existing.textContent = emoji + ' ' + (parseInt(existing.dataset.count || 1) + 1);
        existing.dataset.count = parseInt(existing.dataset.count || 1) + 1;
      } else {
        const badge = document.createElement('span');
        badge.classList.add('reaction-badge');
        badge.dataset.emoji = emoji;
        badge.dataset.count = 1;
        badge.textContent = emoji + ' 1';
        reactionsEl.appendChild(badge);
      }
    });

    function appendMessage(container, data, isPrivate) {
      const isMine = data.username === username;
      const row = document.createElement('div');
      row.classList.add('msg-row', isMine ? 'mine' : 'others');

      if (!isMine) {
        const av = document.createElement('div');
        av.classList.add('msg-avatar');
        av.textContent = data.username[0].toUpperCase();
        row.appendChild(av);
      }

      const content = document.createElement('div');
      content.classList.add('msg-content');

      if (!isMine) {
        const name = document.createElement('div');
        name.classList.add('msg-name');
        name.textContent = data.username;
        content.appendChild(name);
      }

      const bubbleWrap = document.createElement('div');
      bubbleWrap.classList.add('bubble-wrap');

      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.dataset.id = data.id;
      bubble.textContent = data.text;

      if (!isPrivate) {
        bubble.onclick = (e) => {
          e.stopPropagation();
          if (activeEmojiPicker) { activeEmojiPicker.remove(); activeEmojiPicker = null; return; }
          const picker = document.createElement('div');
          picker.classList.add('emoji-picker');
          EMOJIS.forEach(emoji => {
            const span = document.createElement('span');
            span.textContent = emoji;
            span.onclick = (e) => {
              e.stopPropagation();
              socket.emit('reaction', { messageId: data.id, emoji });
              picker.remove();
              activeEmojiPicker = null;
            };
            picker.appendChild(span);
          });
          bubbleWrap.appendChild(picker);
          activeEmojiPicker = picker;
        };
      }

      bubbleWrap.appendChild(bubble);
      content.appendChild(bubbleWrap);

      const reactionsEl = document.createElement('div');
      reactionsEl.classList.add('reactions');
      content.appendChild(reactionsEl);

      const time = document.createElement('div');
      time.classList.add('msg-time');
      const now = new Date();
      time.textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
      content.appendChild(time);

      row.appendChild(content);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    }

    document.addEventListener('click', () => {
      if (activeEmojiPicker) { activeEmojiPicker.remove(); activeEmojiPicker = null; }
    });

    function openDM(user) {
      currentDM = user;
      document.getElementById('dm-name').textContent = user;
      document.getElementById('dm-av').textContent = user[0].toUpperCase();
      document.getElementById('dm-messages').innerHTML = '';
      showTab('dm');
    }

    const dmInput = document.getElementById('dm-input');
    const dmSendBtn = document.getElementById('dm-send-btn');

    dmSendBtn.onclick = sendDM;
    dmInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDM(); }
    });

    function sendDM() {
      const msg = dmInput.value.trim();
      if (msg && currentDM) {
        socket.emit('private message', { to: currentDM, text: msg });
        dmInput.value = '';
        dmInput.style.height = 'auto';
        dmInput.focus();
      }
    }

    socket.on('private message', (data) => {
      const dmMessages = document.getElementById('dm-messages');
      appendMessage(dmMessages, data, true);
    });

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/login.html';
    }

    const aiPanel = document.getElementById('ai-panel');
    const aiMessages = document.getElementById('ai-messages');
    const aiInput = document.getElementById('ai-input');
    const aiSendBtn = document.getElementById('ai-send-btn');
    const aiHistory = [];

    function openAI() {
      aiPanel.classList.add('open');
      if (aiMessages.children.length === 0) {
        addAIMessage("Hey! I'm your AI assistant. Ask me anything!", 'bot');
      }
    }
    function closeAI() { aiPanel.classList.remove('open'); }

    aiSendBtn.onclick = sendAIMessage;
    aiInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAIMessage(); }
    });

    async function sendAIMessage() {
      const msg = aiInput.value.trim();
      if (!msg) return;
      aiInput.value = '';
      aiInput.style.height = 'auto';
      addAIMessage(msg, 'user');
      aiHistory.push({ role: 'user', content: msg });

      const typingRow = document.createElement('div');
      typingRow.classList.add('ai-row', 'bot-row');
      const typingAv = document.createElement('div');
      typingAv.classList.add('ai-row-avatar');
      typingAv.textContent = '✦';
      const typingBubble = document.createElement('div');
      typingBubble.classList.add('ai-bubble');
      typingBubble.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      typingRow.appendChild(typingAv);
      typingRow.appendChild(typingBubble);
      aiMessages.appendChild(typingRow);
      aiMessages.scrollTop = aiMessages.scrollHeight;

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: [
              { role: 'system', content: 'You are a helpful assistant. Keep answers clear, concise and friendly.' },
              ...aiHistory
            ]
          })
        });
        const data = await res.json();
        typingRow.remove();
        const reply = data.choices[0].message.content;
        aiHistory.push({ role: 'assistant', content: reply });
        addAIMessage(reply, 'bot');
      } catch (err) {
        typingRow.remove();
        addAIMessage('Sorry, something went wrong!', 'bot');
      }
    }

    function addAIMessage(text, type) {
      const row = document.createElement('div');
      row.classList.add('ai-row', type === 'user' ? 'user-row' : 'bot-row');
      if (type === 'bot') {
        const av = document.createElement('div');
        av.classList.add('ai-row-avatar');
        av.textContent = '✦';
        row.appendChild(av);
      }
      const bubble = document.createElement('div');
      bubble.classList.add('ai-bubble');
      bubble.textContent = text;
      row.appendChild(bubble);
      aiMessages.appendChild(row);
      aiMessages.scrollTop = aiMessages.scrollHeight;
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
